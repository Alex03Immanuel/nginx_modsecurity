{% extends "base.html" %}
 
{% block body %}

{% if error %}
    <p>{{ error }}</p>
{% endif %}

<form action = "{{ url_for('sign_in') }}" method = "post">
    <input type = "text" name = "username" placeholder = "Enter username">
    <input type = "password" name = "password" placeholder = "Enter password">
    <input type = "submit" value = "submit">
</form>

{% endblock %}
