{% extends "base.html" %}

{% block body %}

<div class="row justify-content-center" style="min-height:78vh;align-items:center;">
    <div class="col-md-4 col-lg-3">

        <div class="text-center mb-4">
            <h4 style="font-size:1.3rem;font-weight:700;color:#0a1628;margin-bottom:0.25rem;">
                Sign in
            </h4>
            <p style="font-size:0.825rem;color:#6c757d;margin:0;">
                Enter your credentials to access MediPortal
            </p>
        </div>

        <div class="card p-4">

            {% if error %}
            <div class="alert-danger mb-3 d-flex align-items-center gap-2" style="padding:0.6rem 0.875rem;border-radius:8px;">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" style="flex-shrink:0;">
                    <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="#b91c1c"/>
                </svg>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form action="{{ url_for('sign_in') }}" method="post">

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Enter username"
                        autocomplete="off"
                        required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter password"
                        required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2">
                    Sign In
                </button>

            </form>

        </div>

        <div class="text-center mt-3">
            <a href="{{ url_for('welcome') }}" class="back-link" style="justify-content:center;">
                ← Back to home
            </a>
        </div>

        <div class="text-center mt-2">
            <p style="font-size:0.72rem;color:#adb5bd;margin:0;">
                Protected by MediPortal WAF · All login attempts are monitored
            </p>
        </div>

    </div>
</div>

{% endblock %}
